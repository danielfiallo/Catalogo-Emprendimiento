<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechMode</title>
    
    <!-- Tu favicon de dragón tecnológico -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- 🎯 CÓDIGO BASE DEL PÍXEL DE META (FACEBOOK) -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      
      // IMPORTANTE: Cambia el '111111111111111' por el ID real de tu Píxel cuando lo tengas.
      // Dejamos este de ejemplo para probar que la extensión lo detecte con éxito.
      fbq('init', '111111111111111'); 
      fbq('track', 'PageView');
    </script>
    <noscript>
      <img height="1" width="1" style="display:none" 
           src="https://www.facebook.com/tr?id=111111111111111&ev=PageView&noscript=1" />
    </noscript>
    <!-- FIN DEL CÓDIGO DEL PÍXEL -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
